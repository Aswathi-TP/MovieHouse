<!--<!DOCTYPE html>-->
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="div1">
    <h1 style="text-align:center;padding-top:150px;">Forgot Password?</h1>
</div>
<div class="form-container">

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">submit</button>
</form>
</div>
</body>

<style>

    .div1{

       height:650px;

       background-repeat:no-repeat;
       background-size:100% 100%;

        }
    /* Style the form container */
    .form-container {
        max-width: 400px;
        margin-top:-440px;
        padding: 20px;

        border-radius: 5px;
        background-color: white;
        box-shadow: 0 0 40px 2px rgba(37,73,214,0.14);;
        margin-left:450px;
    }

    /* Style form elements */
    .form-container input[type=text],
    .form-container input[type=email],
    .form-container input[type=password] {
        width: 100%;
        padding: 12px 20px;
        margin: 8px 0;
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 30px;
        box-sizing: border-box;
        background: transparent;
        color:black;
    }

    /* Style the submit button */
    .form-container button[type=submit] {
        background-color: #4CAF50;
        color: white;
        padding: 14px 20px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-weight:600;
        font-size:20px;
    }

    /* Change button color on hover */
    .form-container button[type=submit]:hover {
        background-color: green;
    }

</style>
</html>
