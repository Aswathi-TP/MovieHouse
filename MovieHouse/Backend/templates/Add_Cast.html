<div class="col-sm-12 col-md-12" style="margin-top:20px;">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Add Cast & crew</h4>

                                <form class="mt-4" method="post" action="{% url 'save_cast_crew' %}" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <form>
                                        <div class="form-group mb-4">
                                        <label class="mr-sm-2" for="inlineFormCustomSelect">Movie Name</label>
                                        <select class="custom-select mr-sm-2"  name="movie">
                                            <option selected="">Choose Movie</option>
                                            {% for m in mov %}
                                            <option>{{m.MovieName}}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                     <div class="row mb-3">
                                            <div class="form-group col-sm-12 col-md-4">
                                                <label>Actor Name</label>
                                                <input type="text" class="form-control" placeholder="Name" name="actor" required>
                                            </div>

                                         <div class="form-group col-sm-12 col-md-4">
                                                <label>Character Name</label>
                                                <input type="text" class="form-control" placeholder="Character" name="character" required>
                                            </div>

                                            <div class="form-group col-sm-12 col-md-4">
                                        <label>Actor Image</label>
                                        <div class="custom-file ">
                                            <input type="file" class="custom-file-input"  name="actorimg">
                                            <label class="custom-file-label">Choose file</label>
                                        </div>
                                    </div>
                                        </div>

                                        <div class="row mb-3">
                                            <div class="form-group col-sm-12 col-md-4">
                                                <label>Crew Name</label>
                                                <input type="text" class="form-control" placeholder="Name" name="crew" required>
                                            </div>

                                         <div class="form-group col-sm-12 col-md-4">
                                                <label>Role</label>
                                                <input type="text" class="form-control" placeholder="Role" name="role" required>
                                            </div>

                                            <div class="form-group col-sm-12 col-md-4">
                                        <label>Crew Image</label>
                                        <div class="custom-file ">
                                            <input type="file" class="custom-file-input"  name="crewimg">
                                            <label class="custom-file-label">Choose file</label>
                                        </div>
                                    </div>
                                        </div>




                                        <div class="form-actions">
                                        <div class="text-center">
                                            <button type="submit" class="btn btn-info">Sbmit</button>
                                        </div>
                                    </div>


                                </form>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
{% if messages %}
    {% for i in messages %}
        {% if i.tags == 'warning' %}
            <script>
                swal('{{i}}','','warning')
            </script>
        {% elif i.tags == 'error' %}
            <script>
                swal('{{i}}','','error')
            </script>
        {% elif i.tags == 'success' %}
            <script>
                swal('{{i}}','','success')
            </script>
        {% else %}
             <script>
                swal('{{i}}','','info')
            </script>
        {% endif %}
    {% endfor %}
{% endif %}
