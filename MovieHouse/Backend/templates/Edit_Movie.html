<div class="col-sm-12 col-md-12" style="margin-top:20px;">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Update Movies</h4>

                                <form class="mt-4" method="post" action="{% url 'update_movie' m_id=film.id %}" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <form>
                                    <div class="form-group">
                                        <label>Movie Name</label>
                                        <input type="text" class="form-control" placeholder="Name" name="mname" value="{{film.MovieName}}">
                                    </div>
                                    <div class="form-group">
                                        <label>Synopsis</label>
                                        <textarea class="form-control" rows="3" placeholder="Synopsis" name="synopsis">{{film.Synopsis}}</textarea>
                                    </div>
                                    <div class="form-group">
                                        <label>Genre</label>
                                        <input type="text" class="form-control" placeholder="Genre" name="genre" value="{{film.Genre}}">
                                    </div>
                                    <div class="form-group mb-4">
                                        <label class="mr-sm-2" for="inlineFormCustomSelect">Language</label>
                                        <select class="custom-select mr-sm-2"  name="Language">
                                            <option selected="">{{film.Language}}</option>
                                            <option>Malayalam</option>
                                            <option>Tamil</option>
                                            <option>Hindi</option>
                                            <option>English</option>
                                            <option>Telugu</option>
                                            <option>Kannada</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Release Date</label>
                                        <input type="date" class="form-control"  name="date" value="{{film.ReleaseDate}}">
                                    </div>
                                    <label>Upload Image1</label><br>
                                        <img src="{{film.Poster1.url}}" width="150px" height="100px" class="mb-3">
                                    <div class="input-group mb-3">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text">Upload</span>
                                        </div>
                                        <div class="custom-file">
                                            <input type="file" class="custom-file-input" id="inputGroupFile01" name="image1">
                                            <label class="custom-file-label" for="inputGroupFile01">Choose file</label>
                                        </div>
                                    </div>
                                    <label>Upload Image2</label><br>
                                        <img src="{{film.Poster2.url}}" width="150px" height="100px" class="mb-3">
                                    <div class="input-group mb-3">

                                        <div class="input-group-prepend">

                                            <span class="input-group-text">Upload</span>
                                        </div>
                                        <div class="custom-file">
                                            <input type="file" class="custom-file-input" name="image2">
                                            <label class="custom-file-label" for="inputGroupFile01">Choose file</label>
                                        </div>
                                    </div>
                                    <label>Upload Image3</label><br>
                                        <img src="{{film.Poster3.url}}" width="150px" height="100px" class="mb-3">
                                    <div class="input-group mb-3">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">Upload</span>
                                        </div>
                                        <div class="custom-file">
                                            <input type="file" class="custom-file-input"  name="image3">
                                            <label class="custom-file-label" for="inputGroupFile01">Choose file</label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Duration</label>
                                        <input type="text" class="form-control" placeholder="Duration" name="duration" value="{{film.Duration}}">
                                    </div>
                                    <div class="form-group">
                                        <label>Trailer Link</label>
                                        <input type="url" class="form-control" placeholder="Link" name="tlink" value="{{film.TrailerLink}}">
                                    </div>
                                    <div class="form-actions">
                                        <div class="text-center">
                                            <button type="submit" class="btn btn-info">Update</button>
                                        </div>
                                    </div>
                                </form>
