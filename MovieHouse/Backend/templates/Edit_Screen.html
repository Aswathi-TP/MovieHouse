<!--<!DOCTYPE html>-->
{% extends 'index.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-sm-12 col-md-12" style="margin-top:20px;">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Edit Theatre Screen</h4>

                                <form class="mt-4" method="post" action="{% url 'update_screen' s_id=scrn.id %}">
                                    {% csrf_token %}
                                    <div class="form-group mb-4">
                                        <label class="mr-sm-2" for="inlineFormCustomSelect">Theatre Name</label>
                                        <select class="custom-select mr-sm-2" id="inlineFormCustomSelect" name="tname">
                                            <option>{{scrn.Theatre}}</option>
                                            {% for i in Tname %}
                                            <option>{{i.TheatreName}}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Screen Name</label>
                                        <input type="text" class="form-control" placeholder="Screen Name" name="sname" value="{{scrn.ScreenName}}">
                                    </div>
                                    <div class="form-group">
                                        <label>Total Seats</label>
                                        <input type="text" class="form-control" placeholder="Seats" name="seat" value="{{scrn.TotalSeat}}">
                                    </div>
                                    <div class="form-group">
                                        <label>Premium Seats</label>
                                        <input type="text" class="form-control" placeholder="Pre-Seats" name="pseat" value="{{scrn.PremiumSeat}}">
                                    </div>
                                    <div class="form-group">
                                        <label>Standard Seats</label>
                                        <input type="text" class="form-control" placeholder="Stn-Seats" name="Sseat" value="{{scrn.StandardSeat}}">
                                    </div>
                                    <div class="form-actions">
                                        <div class="text-center">
                                            <button type="submit" class="btn btn-info">Update</button>
                                            <button type="reset" class="btn btn-dark">Reset</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
</body>
</html>
{% endblock %}
