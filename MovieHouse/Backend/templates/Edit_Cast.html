<div class="col-sm-12 col-md-12" style="margin-top:20px;">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Add Cast & crew</h4>

                                <form class="mt-4" method="post" action="{% url 'update_cast_crew' c_id=cst.id %}" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <form>
                                        <div class="form-group mb-4">
                                        <label class="mr-sm-2" for="inlineFormCustomSelect">Movie Name</label>
                                        <select class="custom-select mr-sm-2"  name="movie">
                                            <option selected="">{{cst.Movie}}</option>
                                            {% for m in mov %}
                                            <option>{{m.MovieName}}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                     <div class="row mb-3">
                                            <div class="form-group col-sm-12 col-md-3">
                                                <label>Actor Name</label>
                                                <input type="text" class="form-control" placeholder="Name" name="actor" value="{{cst.ActorName}}">
                                            </div>

                                         <div class="form-group col-sm-12 col-md-3">
                                                <label>Character Name</label>
                                                <input type="text" class="form-control" placeholder="Character" name="character" value="{{cst.Character}}">
                                            </div>

                                            <div class="form-group  col-md-3">
                                        <label>Actor Image</label>
                                        <div class="custom-file ">
                                            <input type="file" class="custom-file-input"  name="actorimg">
                                            <label class="custom-file-label">Choose file</label>
                                        </div>
                                    </div>
                                        </div>

                                        <div class=" col-md-3">
                                            <img src="{{cst.ActorImage.url}}" class="mb-3" width="100px" height="100px" style="margin-top:-100px; margin-left:800px;">
                                        </div>


                                        <div class="row mb-3">
                                            <div class="form-group col-sm-12 col-md-3">
                                                <label>Crew Name</label>
                                                <input type="text" class="form-control" placeholder="Name" name="crew" value="{{cst.CrewName}}">
                                            </div>

                                         <div class="form-group col-sm-12 col-md-3">
                                                <label>Role</label>
                                                <input type="text" class="form-control" placeholder="Role" name="role" value="{{cst.Role}}">
                                            </div>

                                            <div class="form-group  col-md-3">
                                        <label>Actor Image</label>
                                        <div class="custom-file ">
                                            <input type="file" class="custom-file-input"  name="crewimg">
                                            <label class="custom-file-label">Choose file</label>
                                        </div>
                                    </div>
                                        </div>

                                        <div class=" col-md-3">
                                            <img src="{{cst.CrewImage.url}}" class="mb-3" width="100px" height="100px" style="margin-top:-100px; margin-left:800px;">
                                        </div>




                                        <div class="form-actions">
                                        <div class="text-center">
                                            <button type="submit" class="btn btn-info">Sbmit</button>
                                        </div>
                                    </div>


                                </form>
